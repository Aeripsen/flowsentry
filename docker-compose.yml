# FlowSentry local stack: the FastAPI API on 8000 and the Streamlit dashboard on
# 8501, both from the one image built here. The model is trained into the image at
# build time from the committed BCCC sample, so no data volumes are needed.
services:
  api:
    build: .
    image: flowsentry:latest
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  dashboard:
    build: .
    image: flowsentry:latest
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      - api
    restart: unless-stopped
