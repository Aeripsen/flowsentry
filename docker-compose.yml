# FlowSentry local stack: the FastAPI API on 8000 and the Streamlit dashboard on
# 8501, both from the one image built here.
services:
  api:
    build: .
    image: flowsentry:latest
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  dashboard:
    build: .
    image: flowsentry:latest
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    environment:
      - PYTHONPATH=/app/src
    ports:
      - "8501:8501"
    # The dashboard replays KDDTest+, which is gitignored and excluded from the
    # image (.dockerignore), so mount it in read-only at runtime.
    volumes:
      - ./data:/app/data:ro
    depends_on:
      - api
    restart: unless-stopped
